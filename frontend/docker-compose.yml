services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NUXT_APP_BASE_URL: /verifront/
    container_name: veritix_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    profiles:
      - prod
    mem_limit: 3g
    cpus: 4.0
